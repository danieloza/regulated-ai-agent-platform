services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: regulated_ai
      POSTGRES_USER: regulated_ai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev-only-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regulated_ai -d regulated_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/app/data/regulated_ai_agent.db}
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      APP_ENV: ${APP_ENV:-development}
      POLICY_VERSION: ${POLICY_VERSION:-2026.07.10-default}
      ENTERPRISE_RESOURCE_TENANT: ${ENTERPRISE_RESOURCE_TENANT:-demo}
      ENTERPRISE_API_CREDENTIALS: ${ENTERPRISE_API_CREDENTIALS:-[]}
      SECURE_CONTEXT_MASTER_SECRET: ${SECURE_CONTEXT_MASTER_SECRET:-}
      SECURE_CONTEXT_PASSWORD_HASH: ${SECURE_CONTEXT_PASSWORD_HASH:-}
      OBSIDIAN_ALLOWED_ROOTS: ${OBSIDIAN_ALLOWED_ROOTS:-}
      OBSIDIAN_MAX_FILES: ${OBSIDIAN_MAX_FILES:-500}
      OBSIDIAN_MAX_FILE_BYTES: ${OBSIDIAN_MAX_FILE_BYTES:-262144}
      OBSIDIAN_MAX_TOTAL_BYTES: ${OBSIDIAN_MAX_TOTAL_BYTES:-10485760}
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 6

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
  postgres-data:
