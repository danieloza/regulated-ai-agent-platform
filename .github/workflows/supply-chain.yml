name: Supply Chain Security

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Reject newly introduced vulnerable dependencies
        uses: actions/dependency-review-action@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          fail-on-severity: high

  dependency-audit-and-sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Audit backend dependencies and generate CycloneDX SBOM
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit cyclonedx-bom
          python -m pip_audit . --progress-spinner off
          python -m venv .sbom-venv
          .sbom-venv/bin/python -m pip install .
          python -m cyclonedx_py environment .sbom-venv/bin/python \
            --pyproject pyproject.toml \
            --output-reproducible \
            --output-format JSON \
            --output-file backend-sbom.cdx.json
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Audit frontend dependencies and generate CycloneDX SBOM
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=high
          npm sbom --sbom-format cyclonedx > frontend-sbom.cdx.json
      - name: Publish reviewable SBOM artifacts
        uses: actions/upload-artifact@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          name: cyclonedx-sboms
          path: |
            backend/backend-sbom.cdx.json
            frontend/frontend-sbom.cdx.json
          if-no-files-found: error
          retention-days: 30

  container-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build backend image
        run: docker build --tag regulated-ai-backend:${{ github.sha }} ./backend
      - name: Scan backend image for high and critical vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: regulated-ai-backend:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL
