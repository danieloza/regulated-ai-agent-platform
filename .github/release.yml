changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: Security and governance
      labels:
        - security
        - governance
    - title: Platform capabilities
      labels:
        - enhancement
        - feature
    - title: Fixes
      labels:
        - bug
        - fix
    - title: Documentation and operations
      labels:
        - documentation
        - operations
    - title: Other changes
      labels:
        - "*"
