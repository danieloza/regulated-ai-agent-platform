apiVersion: v1
kind: ConfigMap
metadata:
  name: regulated-ai-config
  namespace: regulated-ai
data:
  REDIS_URL: redis://redis:6379/0
  POLICY_VERSION: 2026.07.10-default
  ENTERPRISE_RESOURCE_TENANT: demo
  APP_ENV: production
  ALLOWED_ORIGINS: https://regulated-ai.example.com
  ALLOWED_HOSTS: regulated-ai.example.com
  OIDC_ISSUER: ""
  OIDC_AUDIENCE: ""
  OIDC_JWKS_URL: ""
  OIDC_ALLOWED_ALGORITHMS: RS256
  OIDC_GROUPS_CLAIM: groups
  OIDC_GROUP_ROLE_MAP: "{}"
  OIDC_ROLES_CLAIM: roles
  OIDC_TENANT_CLAIM: tenant_ids
  CASE_MANAGEMENT_API_URL: ""
  OBSIDIAN_ALLOWED_ROOTS: ""
  OBSIDIAN_MAX_FILES: "500"
  OBSIDIAN_MAX_FILE_BYTES: "262144"
  OBSIDIAN_MAX_TOTAL_BYTES: "10485760"
