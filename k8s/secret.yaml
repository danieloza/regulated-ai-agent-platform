apiVersion: v1
kind: Secret
metadata:
  name: regulated-ai-secrets
  namespace: regulated-ai
type: Opaque
stringData:
  DATABASE_URL: replace-with-managed-postgresql-url
  ENTERPRISE_API_CREDENTIALS: '[]'
